name: Build Application

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  get-version:
    name: Get project version
    outputs:
      version: ${{ steps.gradle-version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4.2.2
      - name: Get project version
        id: gradle-version
        run: |
          echo "version=$(gradle properties -q | awk '/^version:/ {print $2}')" >> "$GITHUB_OUTPUT"

  build:
    name: Gradle Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: get-version
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, macos-15-intel, windows-latest ]
      fail-fast: false
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      # ──────────────────────────────────────────
      # SQLCipher installieren & bundlen
      # ──────────────────────────────────────────

      - name: Install & bundle SQLCipher (macOS)
        if: startsWith(matrix.os, 'mac')
        run: |
          brew install sqlcipher
          # Copy binary into resources so jpackage picks it up
          mkdir -p resources/sqlcipher/mac
          cp "$(which sqlcipher)" resources/sqlcipher/mac/sqlcipher
          chmod +x resources/sqlcipher/mac/sqlcipher

      - name: Install & bundle SQLCipher (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get install -y sqlcipher
          mkdir -p resources/sqlcipher/linux
          cp "$(which sqlcipher)" resources/sqlcipher/linux/sqlcipher
          chmod +x resources/sqlcipher/linux/sqlcipher

      - name: Bundle SQLCipher (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          # Binary is committed to the repo under tools/sqlcipher/windows/sqlcipher.exe
          # (SQLite3MultipleCiphers x64 shell – SQLCipher-compatible)
          # To update: https://github.com/utelle/SQLite3MultipleCiphers/releases/latest
          New-Item -ItemType Directory -Force -Path "resources\sqlcipher\windows"
          Copy-Item "tools\sqlcipher\windows\sqlcipher.exe" `
                    -Destination "resources\sqlcipher\windows\sqlcipher.exe"
          Write-Host "SQLCipher bundled from repo: $(Get-Item resources\sqlcipher\windows\sqlcipher.exe | Select-Object -ExpandProperty Length) bytes"

      # ──────────────────────────────────────────
      # File names
      # ──────────────────────────────────────────
      - name: Create MacOS file name
        if: startsWith(matrix.os, 'mac')
        run: |
          echo "OUTPUT_FILE_NAME=fqlite-${{ needs.get-version.outputs.version }}-macOS-$(uname -m).dmg" >> $GITHUB_ENV

      - name: Create Ubuntu file name
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          echo "OUTPUT_FILE_NAME=fqlite-${{ needs.get-version.outputs.version }}-$(uname -m).deb" >> $GITHUB_ENV

      # ──────────────────────────────────────────
      # macOS: Zertifikat importieren
      # ──────────────────────────────────────────
      - name: Import macOS signing certificate
        if: startsWith(matrix.os, 'mac')
        env:
          MACOS_CERTIFICATE:          ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          rm certificate.p12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # ──────────────────────────────────────────
      # macOS: App bauen
      # ──────────────────────────────────────────
      - name: Create MacOS installer
        if: startsWith(matrix.os, 'mac')
        run: ./gradlew --info --stacktrace jpackage

      # ──────────────────────────────────────────
      # macOS: SQLCipher ins App-Bundle kopieren
      # ──────────────────────────────────────────
      - name: Copy SQLCipher into macOS app bundle
        if: startsWith(matrix.os, 'mac')
        run: |
          SQLCIPHER_DST="build/jpackage/fqlite.app/Contents/MacOS/sqlcipher"
          cp resources/sqlcipher/mac/sqlcipher "$SQLCIPHER_DST"
          chmod +x "$SQLCIPHER_DST"

      # ──────────────────────────────────────────
      # macOS: App-Bundle + SQLCipher signieren
      # ──────────────────────────────────────────
      - name: Sign macOS app bundle
        if: startsWith(matrix.os, 'mac')
        env:
          SIGN_ID: "Developer ID Application: Dirk Pawlaszczyk (HYVLQZ96HH)"
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          APP="build/jpackage/fqlite.app"
          SIGN_FLAGS="--force --timestamp --options runtime --keychain build.keychain"

          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
          </dict>
          </plist>
          EOF

          # 1. Native Libs in JARs extrahieren, signieren, zurückpacken
          find "$APP" -name "*.jar" | while read -r JAR; do
            NATIVE=$(jar tf "$JAR" 2>/dev/null \
              | grep -E '\.(dylib|jnilib)$' \
              | grep -iE '(mac|darwin|osx)' || true)
            if [ -n "$NATIVE" ]; then
              echo "Processing JAR: $(basename $JAR)"
              JAR_ABS=$(realpath "$JAR")
              TMPDIR=$(mktemp -d)
              (cd "$TMPDIR" && jar xf "$JAR_ABS")
              find "$TMPDIR" \( -name "*.dylib" -o -name "*.jnilib" \) | while read -r LIB; do
                echo "  Signing: $(basename $LIB)"
                codesign $SIGN_FLAGS --sign "$SIGN_ID" "$LIB" || true
              done
              (cd "$TMPDIR" && jar cf "$JAR_ABS" .)
              rm -rf "$TMPDIR"
            fi
          done

          # 2. .dylib / .jnilib außerhalb von JARs
          find "$APP" \( -name "*.dylib" -o -name "*.jnilib" \) | while read -r LIB; do
            codesign $SIGN_FLAGS --sign "$SIGN_ID" "$LIB" || true
          done

          # 3. Executables im runtime-Ordner
          find "$APP/Contents/runtime" -type f | while read -r BIN; do
            file "$BIN" | grep -q "Mach-O" && \
              codesign $SIGN_FLAGS --sign "$SIGN_ID" "$BIN" || true
          done

          # 4. SQLCipher binary signieren (muss vor dem Bundle-Sign passieren)
          codesign $SIGN_FLAGS \
            --entitlements entitlements.plist \
            --sign "$SIGN_ID" \
            "$APP/Contents/MacOS/sqlcipher"
          echo "✅ sqlcipher signed"

          # 5. Weitere Executables (protoc etc.)
          find "$APP/Contents/MacOS" -type f | while read -r BIN; do
            if file "$BIN" | grep -q "Mach-O"; then
              codesign $SIGN_FLAGS --sign "$SIGN_ID" "$BIN" || true
            fi
          done

          # 6. Schreibrechte sicherstellen
          chmod -R u+w "$APP"

          # 7. App-Bundle als Ganzes signieren (zuletzt!)
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --keychain build.keychain \
            --sign "$SIGN_ID" \
            "$APP"

          codesign --verify --strict --verbose=2 "$APP"
          echo "✅ App bundle signed successfully"

      # ──────────────────────────────────────────
      # macOS: DMG bauen & signieren
      # ──────────────────────────────────────────
      - name: Create and sign macOS DMG
        if: startsWith(matrix.os, 'mac')
        env:
          SIGN_ID: "Developer ID Application: Dirk Pawlaszczyk (HYVLQZ96HH)"
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          if [ ! -d "build/jpackage/fqlite.app" ]; then
            echo "Error: fqlite.app not found"; exit 1
          fi

          sleep 5

          mkdir -p dmg-staging
          cp -R build/jpackage/fqlite.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "FQLite" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "${{ env.OUTPUT_FILE_NAME }}"

          codesign --force --sign "$SIGN_ID" \
            --timestamp \
            "${{ env.OUTPUT_FILE_NAME }}"

          echo "OUTPUT_FILE=$(pwd)/${{ env.OUTPUT_FILE_NAME }}" >> $GITHUB_ENV
          rm -rf dmg-staging

      # ──────────────────────────────────────────
      # macOS: Notarisieren & Staple
      # ──────────────────────────────────────────
      - name: Notarize macOS DMG
        if: startsWith(matrix.os, 'mac')
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.OUTPUT_FILE_NAME }}" \
            --apple-id  "$NOTARY_APPLE_ID" \
            --team-id   "$NOTARY_TEAM_ID" \
            --password  "$NOTARY_PASSWORD" \
            --wait

          xcrun stapler staple "${{ env.OUTPUT_FILE_NAME }}"
          spctl -a -vvv -t install "${{ env.OUTPUT_FILE_NAME }}"
          echo "✅ Notarization successful"

      # ──────────────────────────────────────────
      # Linux
      # ──────────────────────────────────────────
      - name: Create Linux installer
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          ./gradlew --info --stacktrace jpackage
          find build/jpackage -name "*.deb" -exec sh -c 'x="{}"; mv "$x" "${{ env.OUTPUT_FILE_NAME }}"' \;
          echo "OUTPUT_FILE=$(realpath ${{ env.OUTPUT_FILE_NAME }})" >> $GITHUB_ENV

      # ──────────────────────────────────────────
      # Windows
      # ──────────────────────────────────────────
      - name: Create Windows installer
        if: startsWith(matrix.os, 'windows')
        run: |
          $env:Path += ";%cd%\wix314-binaries"; .\gradlew jpackage --info --stacktrace
          $file_name = "fqlite-${{ needs.get-version.outputs.version }}-windows.exe"
          echo "OUTPUT_FILE_NAME=$file_name" >> $env:GITHUB_ENV
          $exe = Get-ChildItem build\jpackage\*.exe | Select-Object -First 1
          $file = Rename-Item -Path "$exe" -NewName "$file_name" -PassThru
          echo "OUTPUT_FILE=$file" >> $env:GITHUB_ENV
          $hash = Get-FileHash $file
          echo "HASH=$($hash[0].hash)" >> $env:GITHUB_ENV

      # ──────────────────────────────────────────
      # Artefakte hochladen
      # ──────────────────────────────────────────
      - name: Verify output file exists
        shell: bash
        run: |
          if [ ! -f "${{ env.OUTPUT_FILE }}" ]; then
            echo "Error: Output file not found at ${{ env.OUTPUT_FILE }}"
            exit 1
          fi
          ls -lh "${{ env.OUTPUT_FILE }}"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ env.OUTPUT_FILE }}"

      - uses: actions/upload-artifact@v4
        with:
          name: "${{ env.OUTPUT_FILE_NAME }}"
          path: "${{ env.OUTPUT_FILE }}"
          overwrite: true
          retention-days: 14

  publish:
    name: Publish release artefacts
    runs-on: ubuntu-latest
    needs:
      - build
      - get-version
    outputs:
      version: ${{ steps.create-version.outputs.version }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4.2.2

      - name: Download latest artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          tag_name: ${{ needs.get-version.outputs.version }}
          make_latest: true
          files: |
            artifacts/*
